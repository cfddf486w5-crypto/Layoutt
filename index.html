<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>DL Layout Editor — Pro</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <strong>DL Layout Editor — Pro</strong>
    <div class="toolbar" id="toolButtons"></div>
    <div class="toolbar">
      <button id="undoBtn">Undo</button><button id="redoBtn">Redo</button>
      <button id="exportJsonBtn">Export JSON</button><button id="importJsonBtn">Import JSON</button>
      <button id="exportPngBtn">Export PNG</button><button id="toggle3dBtn">3D</button><input type="file" id="importJsonInput" accept="application/json" hidden />
    </div>
  </header>

  <main class="layout">
    <aside class="panel left">
      <h3>Palette</h3>
      <input id="searchInput" placeholder="Rechercher (porte, rack, P3...)" />
      <div id="categoryTabs" class="tabs"></div>
      <div id="favoriteBox"></div>
      <div id="paletteList" class="palette"></div>
    </aside>

    <section class="editor">
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="blueprintCanvas"></canvas>
        <canvas id="gridCanvas"></canvas>
      </div>
      <div class="quickbar" id="quickbar"></div>
      <div class="view3d hidden" id="view3dPanel">
        <canvas id="view3dCanvas"></canvas>
        <div class="view3d-controls">
          <button id="walkModeBtn">Walk: OFF</button>
          <button id="reset3dBtn">Reset view</button>
          <button id="focus3dBtn">Focus</button>
          <label>Hauteur murs <input id="wallHeightInput" type="range" min="2" max="4" step="0.1" value="2.6" /></label>
          <label>Épaisseur murs <input id="wallThicknessInput" type="range" min="0.1" max="0.8" step="0.05" value="0.2" /></label>
          <label><input id="showBp3dInput" type="checkbox" checked /> Afficher blueprint au sol</label>
          <label>Qualité <select id="quality3dInput"><option value="high">High</option><option value="low">Low</option></select></label>
        </div>
        <div class="view3d-info" id="view3dInfo">Sélectionnez un objet.</div>
        <div class="view3d-legend" id="view3dLegend"></div>
      </div>

    </section>

    <aside class="panel right">
      <h3>Projet</h3>
      <label>Grille W <input id="gridW" type="number" min="10" max="300" value="60" /></label>
      <label>Grille H <input id="gridH" type="number" min="10" max="300" value="40" /></label>
      <label>Taille cellule <input id="cellSize" type="number" min="8" max="64" value="24" /></label>
      <button id="resizeGridBtn">Appliquer</button>

      <h3>Calques</h3>
      <div id="layersBox"></div>

      <h3>Blueprint</h3>
      <input type="file" id="blueprintInput" accept="image/png,image/jpeg" />
      <label>Opacity <input id="bpOpacity" type="range" min="0" max="1" step="0.05" value="0.5" /></label>
      <label>Scale <input id="bpScale" type="range" min="0.2" max="3" step="0.05" value="1" /></label>
      <button id="bpLockBtn">Verrou blueprint: OFF</button>

      <h3>Propriétés</h3>
      <div id="propsBox">Aucune sélection.</div>
      <button id="deleteSelectionBtn">Supprimer sélection</button>
      <button id="applyTileSelectionBtn">Appliquer tile actif à la sélection</button>

      <h3>Warnings</h3>
      <ul id="warnings"></ul>
    </aside>
  </main>

  <div id="toast"></div>

  <script src="./data/tileCatalog.js"></script>
  <script src="./app.js"></script>
</body>
</html>
